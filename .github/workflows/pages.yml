name: Publish paper to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - "index.html"
      - "paper.html"
      - "paper.pdf"
      - "*.png"
      - ".github/workflows/pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  publish:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v7

      - name: Assemble site (paper + figures only)
        run: |
          mkdir _site
          cp index.html paper.html paper.pdf *.png _site/

      - uses: actions/configure-pages@v6

      - uses: actions/upload-pages-artifact@v5
        with:
          path: _site

      - id: deployment
        uses: actions/deploy-pages@v5
